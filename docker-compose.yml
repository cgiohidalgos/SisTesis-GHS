services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: thesis_backend
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=ebbc1015f164c3b46f50de43732395eed6d9fee8468d36b57bcd9e755911b626830a851fc20e8119d958a964ef918005416f9ef8c8c58068ea94b7d1629c67b4
      - ADMIN_EMAIL=admin@admin.com
      - ADMIN_PASSWORD=admin
      - ADMIN_PASSWORD_RESET=1
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
      # mount source code for live development so changes apply without rebuild
      - ./server:/app
      # protect container-installed node_modules from being overwritten
      - /app/node_modules
    command: ["node", "index.js"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thesis_frontend
    ports:
      - "9048:9048"
    environment:
      - VITE_API_BASE=http://backend:4000
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "9048"]
