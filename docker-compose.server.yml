services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_BASE: /
        VITE_API_BASE: http://104.225.223.220:9008/api
    container_name: sistesis_frontend
    ports:
      - "9008:9008"
    volumes:
      - ./nginx-standalone.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sistesis_net
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sistesis_backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-ebbc1015f164c3b46f50de43732395eed6d9fee8468d36b57bcd9e755911b626830a851fc20e8119d958a964ef918005416f9ef8c8c58068ea94b7d1629c67b4}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@admin.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - NODE_ENV=production
      - FRONTEND_URL=http://104.225.223.220:9008
    volumes:
      - sistesis_data:/app/data
      - sistesis_uploads:/app/uploads
    networks:
      - sistesis_net
    restart: unless-stopped

volumes:
  sistesis_data:
  sistesis_uploads:

networks:
  sistesis_net:
    driver: bridge
